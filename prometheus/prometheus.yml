global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # NestJS backend — métricas de Node.js + HTTP + negocio
  - job_name: pos-backend
    static_configs:
      - targets: ['backend:3000']
    metrics_path: /metrics

  # PostgreSQL exporter — métricas de la base de datos
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
