version: 2

updates:
  # ── GitHub Actions only ──────────────────────────────────────────────────────
  # npm/pnpm sections removed: Dependabot does not support pnpm workspaces
  # correctly — it updates package.json but not pnpm-lock.yaml, breaking
  # --frozen-lockfile in CI. Manage npm deps manually or via Renovate.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/La_Paz
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
    ignore:
      # Don't auto-bump major versions of core actions — review manually
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/build-push-action"
        update-types: ["version-update:semver-major"]
