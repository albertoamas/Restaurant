name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_BASE: ghcr.io/albertoamas/restaurant

jobs:
  # ── Build Docker images and push to GitHub Container Registry ────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pos/shared build

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Type-check backend
        run: pnpm --filter backend typecheck

      - name: Type-check frontend
        run: pnpm --filter frontend typecheck

      - name: Set image tag (short SHA)
        id: tag
        run: echo "value=$(echo ${{ github.sha }} | head -c 8)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/pos-backend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_BASE }}/pos-backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/pos-frontend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_BASE }}/pos-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ── Deploy to VPS via SSH ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   docker-compose.prod.yml
          target:   /opt/pos

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pos

            # Update IMAGE_TAG in .env — awk is safe with any SHA value (no special-char risks)
            awk -v tag="${{ needs.build-and-push.outputs.image_tag }}" \
              'BEGIN{FS=OFS="="} /^IMAGE_TAG=/{$2=tag} 1' .env > .env.tmp \
              && mv .env.tmp .env

            # Authenticate with GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images and restart with zero manual intervention
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to free disk space
            docker image prune -f

            # ── Post-deploy health check ────────────────────────────────────
            echo "Waiting for services to become healthy..."
            sleep 20

            # Verify backend responds (retries 3 times with 10s gap)
            for i in 1 2 3; do
              if docker exec pos-backend wget -qO- http://localhost:3000/health; then
                echo "Backend health check PASSED"
                break
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
              if [ "$i" = "3" ]; then
                echo "Backend health check FAILED after 3 attempts"
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
            done

            # Verify all containers are running
            docker compose -f docker-compose.prod.yml ps
