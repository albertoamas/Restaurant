name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # queue deploys; never kill a running deploy mid-flight

env:
  IMAGE_BASE: ghcr.io/albertoamas/restaurant

jobs:
  # ── Build Docker images and push to GitHub Container Registry ────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pos/shared build

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Typecheck backend
        run: pnpm --filter backend typecheck

      - name: Typecheck frontend
        run: pnpm --filter frontend typecheck

      - name: Set image tag (short SHA)
        id: tag
        run: echo "value=$(echo ${{ github.sha }} | head -c 8)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/pos-backend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_BASE }}/pos-backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/pos-frontend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_BASE }}/pos-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ── Deploy to VPS via SSH ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment: production

    permissions:
      contents: read

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.prod.yml,scripts/,prometheus/,grafana/"
          target:   /opt/pos

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GC_URL:      ${{ secrets.GRAFANA_CLOUD_REMOTE_WRITE_URL }}
          GC_INSTANCE: ${{ secrets.GRAFANA_CLOUD_INSTANCE_ID }}
          GC_KEY:      ${{ secrets.GRAFANA_CLOUD_API_KEY }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     GC_URL,GC_INSTANCE,GC_KEY
          script: |
            set -e
            cd /opt/pos

            # ── On any failure, dump logs for every service ─────────────────
            on_error() {
              echo "===== DEPLOY FAILED — container logs ====="
              docker compose -f docker-compose.prod.yml logs --tail=60 postgres || true
              docker compose -f docker-compose.prod.yml logs --tail=60 backend  || true
              echo "===== disk & memory ====="
              df -h
              free -m
              echo "===== container states ====="
              docker compose -f docker-compose.prod.yml ps || true
            }
            trap on_error ERR

            # ── Pre-flight: abort if disk is critically low (< 500 MB free) ─
            FREE_KB=$(df /var/lib/docker | awk 'NR==2 {print $4}')
            if [ "$FREE_KB" -lt 512000 ]; then
              echo "ERROR: less than 500 MB free on /var/lib/docker ($((FREE_KB/1024)) MB). Aborting."
              df -h
              exit 1
            fi

            # Update IMAGE_TAG in .env
            awk -v tag="${{ needs.build.outputs.image_tag }}" \
              'BEGIN{FS=OFS="="} /^IMAGE_TAG=/{$2=tag} 1' .env > .env.tmp \
              && mv .env.tmp .env

            # ── Grafana Cloud: inject remote_write credentials (idempotent) ─
            # Removes any previous remote_write block (from EOF backward) then
            # appends a fresh one so every deploy is deterministic.
            if [ -n "$GC_URL" ]; then
              sed -i '/^remote_write:/,$d' prometheus/prometheus.yml
              printf '\nremote_write:\n  - url: "%s"\n    basic_auth:\n      username: "%s"\n      password: "%s"\n' \
                "$GC_URL" "$GC_INSTANCE" "$GC_KEY" >> prometheus/prometheus.yml
              echo "Grafana Cloud remote_write injected"
            fi

            # Authenticate with GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull only app images (postgres is pinned — no need to pull every deploy)
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Bring services up; postgres is only recreated if its config/image changed
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove ALL unused images to prevent disk accumulation.
            docker image prune -a -f

            # ── Reload Prometheus config (hot-reload; fall back to restart) ──
            # Needed because docker compose up -d doesn't restart containers
            # when only a bind-mounted file changes.
            if [ -n "$GC_URL" ]; then
              docker exec pos-prometheus wget -qO- --post-data '' \
                http://localhost:9090/-/reload \
                || docker compose -f docker-compose.prod.yml restart prometheus
            fi

            # ── Post-deploy health check (no fixed sleep — retry immediately) ─
            echo "Waiting for backend to become healthy..."
            for i in 1 2 3 4 5; do
              if docker exec pos-backend wget -qO- --timeout=10 http://localhost:3000/health; then
                echo "Backend health check PASSED (attempt $i)"
                break
              fi
              if [ "$i" = "5" ]; then
                echo "Backend health check FAILED after 5 attempts"
                exit 1
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done

            # Verify all containers are running
            docker compose -f docker-compose.prod.yml ps
